# OpenOCD config: Pico DirtyJTAG probe -> BCM2837 (Pi Zero 2 W, 4x Cortex-A53).
#
# Requires: config.txt has `enable_jtag_gpio=1` (routes JTAG to GPIO22-27 alt4),
# and OpenOCD built with the dirtyjtag driver. JTAG wiring (Pi header -> probe):
#   GPIO22=TRST  GPIO23=RTCK  GPIO24=TDO  GPIO25=TCK  GPIO26=TDI  GPIO27=TMS  +GND
#
# Run:   openocd -f openocd_pico_dirtyjtag_bcm2837.cfg
# Then:  aarch64-none-elf-gdb tools/embedded/rad_pi_zero2w/RADKRN.ELF \
#           -x tools/embedded/rad_pi_zero2w_hw/jtag_debug.gdb
#
# NOTE: untested on hardware in-repo -- validate TAPID/debug bases on first bring-up
# (`adapter driver dirtyjtag; init; scan_chain` to read the actual IDCODE).

adapter driver dirtyjtag
transport select jtag
adapter speed 1000

set _CHIPNAME bcm2837
# ARM Cortex-A53 DAP IDCODE (confirm with scan_chain on first connect).
set _DAP_TAPID 0x4ba00477
jtag newtap $_CHIPNAME cpu -irlen 4 -expected-id $_DAP_TAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

# BCM2837 Cortex-A53 per-core debug + CTI base addresses (standard for this SoC).
set _DBGBASE {0x80010000 0x80012000 0x80014000 0x80016000}
set _CTIBASE {0x80018000 0x80019000 0x8001a000 0x8001b000}

set _TARGET $_CHIPNAME.a53
for {set i 0} {$i < 4} {incr i} {
    cti create $_CHIPNAME.cti.$i -dap $_CHIPNAME.dap -ap-num 0 -baseaddr [lindex $_CTIBASE $i]
    target create $_TARGET.$i aarch64 -dap $_CHIPNAME.dap -ap-num 0 \
        -dbgbase [lindex $_DBGBASE $i] -cti $_CHIPNAME.cti.$i -coreid $i \
        [expr {$i==0 ? "" : "-defer-examine"}]
}
targets $_TARGET.0

# Our kernel runs on core 0; the other three are parked (WFE) at boot.
$_TARGET.0 configure -event gdb-attach { halt }
